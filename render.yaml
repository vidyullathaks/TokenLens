services:
  - type: web
    name: tokenlens-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: tokenlens
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
